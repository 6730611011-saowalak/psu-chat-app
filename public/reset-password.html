<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - PSU Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">
  <div class="auth-card">
    <h1>PSU Chat</h1>
    <p class="subtitle">รีเซ็ตรหัสผ่าน</p>

    <input id="email" type="email" placeholder="เลขนักศึกษา10ตัว@psu.ac.th" />
    <input id="newPassword" type="password" placeholder="รหัสผ่านใหม่" />
    <input id="confirmPassword" type="password" placeholder="ยืนยันรหัสผ่านใหม่" />

    <button onclick="resetPassword()">รีเซ็ตรหัสผ่าน</button>

    <p id="msg" class="message-text" style="color:red;"></p>

    <p class="switch-page">
      <a href="login.html">กลับไปหน้าเข้าสู่ระบบ</a>
    </p>
  </div>

  <script>
    async function resetPassword() {
      const email = document.getElementById("email").value.trim();
      const newPassword = document.getElementById("newPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();
      const msg = document.getElementById("msg");

      msg.style.color = "red";
      msg.innerText = "";

      const res = await fetch("/resetPassword", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, newPassword, confirmPassword })
      });

      const data = await res.json();

      if (!data.success) {
        msg.innerText = data.msg;
        return;
      }

      msg.style.color = "green";
      msg.innerText = data.msg;

      setTimeout(() => {
        window.location.href = "login.html";
      }, 1200);
    }
  </script>
</body>
</html>
